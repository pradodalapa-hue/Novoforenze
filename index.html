                <script>
                    // Reconstrução de Chave por XOR Dinâmico - Anti-Engenharia Reversa
                    const _O = [58,5,87,57,58,94,52,62,59,5,56,33,57,5,56,8];
                    const _S = 110;
                    let reconstructedKey = _O.map(b => String.fromCharCode(b ^ _S)).join('');
                    
                    const C = { id:'NOVOFORENZE', k: reconstructedKey, d:'pradodalapa-hue.github.io' };
                    const t = document.getElementById('term');
                    const m = document.getElementById('muralha');

                    // ==========================================
                    // GERENCIADOR INTEGRADO INDEXEDDB (COFRE SEGURO CLIENT-SIDE)
                    // ==========================================
                    const DB_NAME = "JDP_SECURE_STORE";
                    const STORE_NAME = "VaultData";

                    function openDB() {
                        return new Promise((resolve, reject) => {
                            const request = indexedDB.open(DB_NAME, 1);
                            request.onupgradeneeded = (e) => {
                                const db = e.target.result;
                                if (!db.objectStoreNames.contains(STORE_NAME)) {
                                    db.createObjectStore(STORE_NAME);
                                }
                            };
                            request.onsuccess = (e) => resolve(e.target.result);
                            request.onerror = (e) => reject(e.target.error);
                        });
                    }

                    async function setLocalPayload(key, val) {
                        try {
                            const db = await openDB();
                            return new Promise((resolve, reject) => {
                                const tx = db.transaction(STORE_NAME, "readwrite");
                                const store = tx.objectStore(STORE_NAME);
                                const req = store.put(val, key);
                                req.onsuccess = () => resolve();
                                req.onerror = () => reject(req.error);
                            });
                        } catch(e) { console.error("IndexedDB Error", e); }
                    }

                    async function getLocalPayload(key) {
                        try {
                            const db = await openDB();
                            return new Promise((resolve, reject) => {
                                const tx = db.transaction(STORE_NAME, "readonly");
                                const store = tx.objectStore(STORE_NAME);
                                const req = store.get(key);
                                req.onsuccess = () => resolve(req.result);
                                req.onerror = () => reject(req.error);
                            });
                        } catch(e) { return null; }
                    }

                    function writeTerm(text, className = '') {
                        const div = document.createElement('div');
                        if(className) div.className = className;
                        div.innerHTML = text;
                        t.appendChild(div);
                        window.scrollTo(0, document.body.scrollHeight);
                    }

                    async function type(lines, className = '') {
                        for(let line of lines) {
                            let currentText = "";
                            const div = document.createElement('div');
                            if(className) div.className = className;
                            t.appendChild(div);
                            for(let i=0; i<line.length; i++) {
                                currentText += line.charAt(i);
                                div.innerHTML = currentText;
                                await new Promise(r => setTimeout(r, 20));
                            }
                            await new Promise(r => setTimeout(r, 300));
                        }
                    }

                    function showMuralha() {
                        setTimeout(() => {
                            t.style.display = 'none';
                            m.style.display = 'block';
                        }, 1000);
                    }

                    function base64ToUint8Array(base64) {
                        const binaryString = atob(base64);
                        const len = binaryString.length;
                        const bytes = new Uint8Array(len);
                        for (let i = 0; i < len; i++) {
                            bytes[i] = binaryString.charCodeAt(i);
                        }
                        return bytes;
                    }

                    async function deriveKey(password, salt) {
                        const encoder = new TextEncoder();
                        const baseKey = await crypto.subtle.importKey("raw", encoder.encode(password), "PBKDF2", false, ["deriveKey"]);
                        return crypto.subtle.deriveKey(
                            { name: "PBKDF2", salt: salt, iterations: 100000, hash: "SHA-256" },
                            baseKey,
                            { name: "AES-GCM", length: 256 },
                            false,
                            ["decrypt"]
                        );
                    }

                    async function decryptPayload(encryptedObj, password) {
                        const decoder = new TextDecoder();
                        const ciphertext = base64ToUint8Array(encryptedObj.ciphertext);
                        const iv = base64ToUint8Array(encryptedObj.iv);
                        const salt = base64ToUint8Array(encryptedObj.salt);
                        
                        const key = await deriveKey(password, salt);
                        const decrypted = await crypto.subtle.decrypt(
                            { name: "AES-GCM", iv: iv },
                            key,
                            ciphertext
                        );

                        // PROTOCOLO ANTI-FORENSE: Zero-Fill nos buffers de chaves imediatamente após descriptografar
                        ciphertext.fill(0);
                        iv.fill(0);
                        salt.fill(0);

                        return decoder.decode(decrypted);
                    }

                    // Destruição de Evidências em RAM (Protocolo Anti-Forense Global)
                    function wipeMemoryAndBoot(decryptedHtml) {
                        document.open(); 
                        document.write(decryptedHtml); 
                        document.close();
                        
                        // Sobrescreve buffers sensíveis na memória global imediatamente
                        setTimeout(() => {
                            reconstructedKey = "JUNK_" + Math.random();
                            C.k = null;
                            _O.fill(0);
                            window.C = null;
                            window.decryptPayload = null;
                            window.base64ToUint8Array = null;
                            window.deriveKey = null;
                            window.getLocalPayload = null;
                            window.setLocalPayload = null;
                            if (window.gc) window.gc(); 
                        }, 500);
                    }

                    async function validar() {
                        writeTerm("&gt; INICIANDO KERNEL TRADUTOR JDP v16.6-DIAMOND...");
                        await new Promise(r => setTimeout(r, 400));
                        
                        if(window.location.hostname !== C.d) { 
                            await type([
                                "&gt; ERRO CRÍTICO: VIOLAÇÃO DE DOMÍNIO!",
                                "&gt; ACESSO REJEITADO PELO SERVIDOR CENTRAL JDP.",
                                "&gt; RASTREANDO IP DO INVASOR..."
                            ], "error-line"); 
                            showMuralha(); 
                            return; 
                        }

                        // SOBERANIA DIGITAL 100% OFFLINE (Buscando no IndexedDB Blindado)
                        const localCachedPayload = await getLocalPayload(C.id);
                        if (!navigator.onLine) {
                            writeTerm("&gt; DETECTADO MODO OFFLINE. ACESSANDO COFRE INDEXEDDB RESILIENTE...", "success-line");

                                try {
                                    const decryptedHtml = await decryptPayload(localCachedPayload, C.k);
                                    writeTerm("&gt; DESCRIPTOGRAFIA OFFLINE REALIZADA. BOOT IMEDIATO...", "success-line");
                                    wipeMemoryAndBoot(decryptedHtml);
                                    return;
                                } catch(e) {
                                    writeTerm("&gt; ERRO: Falha ao descriptografar cofre local offline.", "error-line");
                                }
                            } else {
                                await type([
                                    "&gt; ERRO CRÍTICO: Sem conexão de rede e sem cache local salvo!",
                                    "&gt; Conecte-se à internet pelo menos uma vez para ativar a soberania offline."
                                ], "error-line");
                                showMuralha();
                                return;
                            }
                        }

                        try {
                            writeTerm("&gt; CONECTANDO AO SERVIDOR DE LICENÇAS CENTRAL...");
                            const r = await fetch('https://raw.githubusercontent.com/pradodalapa-hue/Tetstserbidor/main/clientes.json?t='+Date.now());
                            if(!r.ok) throw new Error("Servidor fora do ar");
                            
                            const d = await r.json();
                            const u = d.find(i => i.id === C.id && i.apiKey === C.k);
                            
                            if(u && u.status === 'ativo') {
                                writeTerm("&gt; CHAVE CORRETA. BAIXANDO PACKET CRIPTOGRAFADO...", "success-line");
                                const r2 = await fetch('https://raw.githubusercontent.com/pradodalapa-hue/Tetstserbidor/main/' + u.path + 'payload.json');
                                const encryptedPayloadObj = await r2.json();
                                
                                // Salva o payload no IndexedDB em vez de LocalStorage (Blindagem Máxima)
                                await setLocalPayload(C.id, encryptedPayloadObj);
                                
                                writeTerm("&gt; TRADUZINDO COFRE DE SEGURANÇA (AES-256-GCM)...");
                                await new Promise(r => setTimeout(r, 400));
                                
                                try {
                                    const decryptedHtml = await decryptPayload(encryptedPayloadObj, C.k);
                                    writeTerm("&gt; TRADUÇÃO COMPLETA. INICIANDO INTERRUPÇÃO DA CASCA...", "success-line");
                                    await new Promise(r => setTimeout(r, 300));
                                    
                                    wipeMemoryAndBoot(decryptedHtml);
                                } catch(decError) {
                                    await type([
                                        "&gt; ERRO INTERNO: FALHA DE INTEGRIDADE DA CHAVE SIMÉTRICA!",
                                        "&gt; CHAVE INCORRETA OU ARQUIVO CORROMPIDO!",
                                        "&gt; SISTEMA DE BLOQUEIO ATIVADO PELO OPERADOR SUPREMO JOSÉ."
                                    ], "error-line");
                                    showMuralha();
                                }
                            } else { 
                                await type([
                                    "&gt; ERRO DE LICENÇA: CLIENTE INATIVO OU CHAVE DE ACESSO REVOGADA!",
                                    "&gt; CONTATE O OPERADOR SUPREMO."
                                ], "error-line");
                                showMuralha(); 
                            }
                        } catch(e) {

                            if (localCachedPayload) {
                                writeTerm("&gt; [!] Servidor indisponível. Acionando contingência local de segurança...", "error-line");

                                    "&gt; ERRO CRÍTICO DE CONEXÃO COM O GITHUB!",
                                    "&gt; IMPOSSÍVEL VERIFICAR STATUS DA LICENÇA ONLINE."
                                ], "error-line");

                    }

                    if('serviceWorker' in navigator) navigator.serviceWorker.register('sw.js');
                    validar();
